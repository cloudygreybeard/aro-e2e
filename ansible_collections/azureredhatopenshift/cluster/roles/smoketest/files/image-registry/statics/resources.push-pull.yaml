apiVersion: v1
data:
  push_image.py: "#!/usr/bin/env python3\n\nimport os\nimport sys\nimport json\nimport
    re\nimport subprocess\nimport tempfile\nimport base64\nimport hashlib\nimport
    argparse\nimport logging\n\ndef parse_args():\n    parser = argparse.ArgumentParser(description=\"Push
    an OCI image tarball to an OpenShift image registry.\")\n    parser.add_argument(\"registry\",
    nargs=\"?\", help=\"Registry hostname\")\n    parser.add_argument(\"repository\",
    nargs=\"?\", help=\"Repository (project/image)\")\n    parser.add_argument(\"tarball\",
    nargs=\"?\", help=\"Path to OCI tarball\")\n    parser.add_argument(\"--verbose\",
    action=\"store_true\", help=\"Enable verbose logging (redacted)\")\n    parser.add_argument(\"--debug\",
    action=\"store_true\", help=\"Enable debug logging (unredacted)\")\n    parser.add_argument(\"--dry-run\",
    action=\"store_true\", help=\"Simulate actions without uploading\")\n    return
    parser.parse_args()\n\ndef redact(text):\n    return re.sub(r'(?i)(Bearer\\s+)[a-zA-Z0-9._-]+',
    r'\\1<REDACTED>', text)\n\ndef log(msg, config):\n    if config.get(\"debug\"):\n
    \       logging.debug(msg)\n    elif config.get(\"verbose\"):\n        logging.info(redact(msg))\n\ndef
    setup_logging(debug):\n    level = logging.DEBUG if debug else logging.INFO\n
    \   logging.basicConfig(format='%(levelname)s: %(message)s', level=level)\n\ndef
    get_config():\n    args = parse_args()\n    registry = args.registry or os.environ.get(\"REGISTRY\")\n
    \   repository = args.repository or (\n        f\"{os.environ.get('PROJECT')}/{os.environ.get('IMAGE_NAME')}\"\n
    \       if os.environ.get(\"PROJECT\") and os.environ.get(\"IMAGE_NAME\")\n        else
    None\n    )\n    tarball = args.tarball or os.environ.get(\"TARBALL\")\n\n    if
    not all([registry, repository, tarball]):\n        print(\"Missing config: registry,
    repository, and tarball required.\")\n        sys.exit(1)\n\n    verbose = args.verbose
    or os.environ.get(\"VERBOSITY\", \"0\") == \"1\"\n    debug = args.debug or os.environ.get(\"DEBUG\",
    \"0\") == \"1\"\n\n    return {\n        \"registry\": registry,\n        \"repository\":
    repository,\n        \"tarball\": tarball,\n        \"tag\": os.environ.get(\"TAG\",
    \"latest\"),\n        \"ca_cert\": os.environ.get(\"CA_CERT\", \"/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt\"),\n
    \       \"token_path\": os.environ.get(\"TOKEN_PATH\", \"/var/run/secrets/kubernetes.io/serviceaccount/token\"),\n
    \       \"verbose\": verbose,\n        \"debug\": debug,\n        \"dry_run\":
    args.dry_run,\n    }\n\ndef sha256_digest(path):\n    h = hashlib.sha256()\n    with
    open(path, \"rb\") as f:\n        while chunk := f.read(8192):\n            h.update(chunk)\n
    \   return f\"sha256:{h.hexdigest()}\"\n\ndef run_curl(method, url, data=None,
    headers=None, extra_args=None, input_file=None, ca_cert=None, token_path=None,
    config=None):\n    token = open(token_path).read().strip()\n    cmd = [\"curl\",
    \"-sfL\", \"-X\", method]\n    if config.get(\"debug\"):\n        cmd.insert(1,
    \"-v\")\n\n    cmd += [\n        \"--cacert\", ca_cert,\n        \"-H\", f\"Authorization:
    Bearer {token}\",\n        *[item for h in (headers or []) for item in (\"-H\",
    h)],\n    ]\n\n    if data:\n        cmd += [\"--data-binary\", \"@-\"]\n    if
    input_file:\n        cmd += [\"--upload-file\", input_file]\n    if extra_args:\n
    \       cmd += extra_args\n\n    cmd.append(url)\n\n    log(\"Running curl: \"
    + ' '.join(cmd), config)\n\n    result = subprocess.run(\n        cmd,\n        input=data,\n
    \       stdout=subprocess.PIPE,\n        stderr=subprocess.PIPE,\n    )\n\n    log(\"stdout:\\n\"
    + result.stdout.decode(), config)\n    log(\"stderr:\\n\" + result.stderr.decode(),
    config)\n\n    if result.returncode != 0:\n        raise RuntimeError(f\"Curl
    failed: returncode={result.returncode}\")\n    return result\n\ndef upload_blob(repo,
    blob_path, digest, config):\n    log(f\"Uploading blob {digest} ...\", config)\n
    \   start = run_curl(\n        method=\"POST\",\n        url=f\"https://{config['registry']}/v2/{repo}/blobs/uploads/\",\n
    \       ca_cert=config[\"ca_cert\"],\n        token_path=config[\"token_path\"],\n
    \       config=config\n    )\n\n    location = None\n    for line in start.stderr.decode().splitlines():\n
    \       match = re.search(r'^< location:\\s*(.+)$', line, re.IGNORECASE)\n        if
    match:\n            location = match.group(1).strip()\n            break\n\n    if
    not location:\n        raise RuntimeError(\"Failed to extract Location header
    from response\")\n\n    put_url = f\"{location}&digest={digest}\" if \"?\" in
    location else f\"{location}?digest={digest}\"\n    run_curl(\"PUT\", put_url,
    input_file=blob_path, ca_cert=config[\"ca_cert\"], token_path=config[\"token_path\"],
    config=config)\n\ndef upload_manifest(repo, manifest, tag, config):\n    manifest_json
    = json.dumps(manifest).encode()\n    result = run_curl(\n        \"PUT\",\n        f\"https://{config['registry']}/v2/{repo}/manifests/{tag}\",\n
    \       data=manifest_json,\n        headers=[\"Content-Type: application/vnd.oci.image.manifest.v1+json\"],\n
    \       ca_cert=config[\"ca_cert\"],\n        token_path=config[\"token_path\"],\n
    \       config=config\n    )\n\n    digest = None\n    for line in result.stderr.decode().splitlines():\n
    \       match = re.search(r'^< docker-content-digest:\\s*([a-z0-9]+:[a-f0-9]+)$',
    line, re.IGNORECASE)\n        if match:\n            digest = match.group(1).strip()\n
    \           break\n\n    if not digest:\n        raise RuntimeError(\"Failed to
    extract Docker-Content-Digest from registry response\")\n\n    return digest\n\ndef
    create_configmap_with_digest(digest, config):\n    \"\"\"Create a ConfigMap with
    the image digest\"\"\"\n    configmap_name = \"smoke-test-image-digest\"\n\n    try:\n
    \       with open(\"/var/run/secrets/kubernetes.io/serviceaccount/namespace\",
    \"r\") as f:\n            namespace = f.read().strip()\n    except FileNotFoundError:\n
    \       print(\"Namespace file not found.\")\n        sys.exit(1)\n\n    cmd =
    [\n        \"oc\", \"create\", \"configmap\", configmap_name,\n        \"--from-literal=digest=\"
    + digest,\n        \"-n\", namespace\n    ]\n    \n    log(f\"Creating ConfigMap
    {configmap_name} in namespace {namespace} with digest.\", config)\n    \n    result
    = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE)\n\n    if
    result.returncode != 0:\n        raise RuntimeError(f\"Failed to create ConfigMap:
    {result.stderr.decode()}\")\n    log(f\"ConfigMap {configmap_name} created successfully
    in namespace {namespace}.\", config)\n\ndef main():\n    config = get_config()\n
    \   setup_logging(config[\"debug\"])\n    repo = config[\"repository\"]\n\n    with
    tempfile.TemporaryDirectory() as tmpdir:\n        subprocess.run([\"tar\", \"-xf\",
    config[\"tarball\"], \"-C\", tmpdir], check=True)\n\n        with open(os.path.join(tmpdir,
    \"index.json\")) as f:\n            index = json.load(f)\n\n        algo, hash_value
    = index[\"manifests\"][0][\"digest\"].split(\":\")\n        manifest_path = os.path.join(tmpdir,
    \"blobs\", algo, hash_value)\n        with open(manifest_path) as f:\n            manifest
    = json.load(f)\n\n        blobs = [manifest[\"config\"]] + manifest[\"layers\"]\n
    \       for blob in blobs:\n            algo, hash_value = blob[\"digest\"].split(\":\")\n
    \           blob_path = os.path.join(tmpdir, \"blobs\", algo, hash_value)\n            actual_digest
    = sha256_digest(blob_path)\n            assert actual_digest == blob[\"digest\"],
    f\"Digest mismatch for {blob_path}\"\n            upload_blob(repo, blob_path,
    blob[\"digest\"], config)\n\n        # Upload manifest and capture digest from
    registry response\n        manifest_digest = upload_manifest(repo, manifest, config[\"tag\"],
    config)\n        print(\"Upload complete.\")\n\n        # Create ConfigMap with
    the digest value for verification job\n        create_configmap_with_digest(manifest_digest,
    config)\n\nif __name__ == \"__main__\":\n    main()\n"
kind: ConfigMap
metadata:
  name: push-image-script-t92t84k248
  namespace: smoke-test-image-registry
